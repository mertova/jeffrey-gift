<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>04 — Proof</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
/* Level 4 — Riddle Sequence */

/* Fragment gallery */
.fragments {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin-bottom: 2rem;
  max-width: 660px;
}
@media (max-width: 480px) {
  .fragments { grid-template-columns: repeat(5, 1fr); gap: 2px; }
}

.fragment {
  aspect-ratio: 1/1;
  background: var(--slate-2);
  border: var(--border);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fragment .frag-num {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--amber-dim);
  letter-spacing: 0.05em;
}
.fragment img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transform: scale(1.08);
  transition: opacity 1.2s ease, transform 1.2s ease;
  filter: saturate(0.8) contrast(1.05);
}
.fragment.revealed img {
  opacity: 1;
  transform: scale(1);
}
.fragment.revealed .frag-num { display: none; }
.fragment.revealed {
  border-color: rgba(212, 135, 42, 0.5);
}

/* Riddle card */
.riddle-card {
  max-width: 660px;
  background: var(--slate-2);
  border: var(--border);
  border-left: 3px solid var(--amber);
  padding: 2rem 1.75rem;
  position: relative;
}
.riddle-card::before {
  content: attr(data-index);
  position: absolute;
  top: 1.5rem;
  right: 1.75rem;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--amber-dim);
  letter-spacing: 0.1em;
}

.riddle-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--amber-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.riddle-prompt {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(1rem, 2.2vw, 1.25rem);
  color: var(--chalk);
  line-height: 1.55;
  margin-bottom: 1.5rem;
  white-space: pre-line;
}

.answer-row {
  display: flex;
  gap: 6px;
  margin-bottom: 0.75rem;
}

#answer-input {
  flex: 1;
  padding: 0.65rem 0.9rem;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  background: var(--slate);
  border: 1px solid rgba(212, 135, 42, 0.25);
  color: var(--chalk);
  border-radius: 2px;
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.05em;
}
#answer-input:focus {
  border-color: var(--amber);
}
#answer-input::placeholder {
  color: var(--chalk-dim);
  opacity: 0.5;
}
#answer-input.correct-flash {
  border-color: var(--amber);
  background: rgba(212, 135, 42, 0.08);
}
#answer-input.wrong-flash {
  border-color: #c0392b;
  animation: shake 0.35s ease;
}

.riddle-feedback {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  min-height: 1.4em;
  letter-spacing: 0.05em;
  color: var(--chalk-dim);
  transition: color 0.3s;
}
.riddle-feedback.ok  { color: var(--amber); }
.riddle-feedback.err { color: #c0392b; }

/* Wrong attempt counter */
.attempt-dots {
  display: flex;
  gap: 4px;
  margin-top: 0.5rem;
}
.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #c0392b;
  opacity: 0;
  transition: opacity 0.3s;
}
.dot.active { opacity: 1; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* Solved state */
.riddle-card.solved {
  border-left-color: var(--amber);
  animation: solvedPulse 0.8s ease;
}
@keyframes solvedPulse {
  0%   { box-shadow: 0 0 0 0 rgba(212,135,42,0.5); }
  50%  { box-shadow: 0 0 0 12px rgba(212,135,42,0); }
  100% { box-shadow: none; }
}

/* Progress line under fragments */
.progress-line {
  height: 2px;
  background: var(--slate-3);
  margin-bottom: 1.5rem;
  max-width: 660px;
  position: relative;
  overflow: hidden;
}
.progress-line-fill {
  height: 100%;
  background: var(--amber);
  transition: width 0.8s ease;
  width: 0%;
}

/* ── Finale overlays ── */
.finale-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 12, 18, 0.98);
  z-index: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s ease;
  text-align: center;
}
.finale-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.finale-photo-wrap {
  max-width: min(440px, 82vw);
  width: 100%;
  margin-bottom: 2rem;
  border: 1px solid rgba(212, 135, 42, 0.35);
  box-shadow:
    0 0 0 4px var(--slate),
    0 0 0 5px rgba(212, 135, 42, 0.2),
    0 30px 60px rgba(0,0,0,0.6);
  animation: finalePhotoIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
}
.finale-photo {
  width: 100%;
  display: block;
  object-fit: cover;
  max-height: 52vh;
  filter: saturate(0.9) contrast(1.05);
}

.finale-heading {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  color: var(--chalk);
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 0.5rem;
  animation: finaleTextIn 0.9s ease 0.9s both;
}
.finale-heading em { color: var(--amber); }

.finale-sub {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--amber);
  letter-spacing: 0.14em;
  margin-bottom: 2rem;
  animation: finaleTextIn 0.9s ease 1.1s both;
}

.finale-overlay .btn {
  animation: finaleTextIn 0.9s ease 1.4s both;
}

@keyframes finalePhotoIn {
  from { opacity: 0; transform: scale(0.94) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes finaleTextIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<main class="page">
  <a href="../menu.html" class="back-link">index</a>
  <header class="page-header">
    <div>
      <div class="label">Problem 04 — Proof</div>
      <h1>Five riddles.</h1>
    </div>
    <div class="meta">
      solved: <strong id="solved">0</strong> / 5<br>
      <span style="color:var(--amber-dim)">// no hints</span>
    </div>
  </header>

  <!-- Fragment progress -->
  <div class="fragments" id="fragments"></div>
  <div class="progress-line">
    <div class="progress-line-fill" id="progress-fill"></div>
  </div>

  <!-- Riddle card -->
  <div class="riddle-card" id="riddle-card" data-index="01 / 05">
    <div class="riddle-label">// riddle_<span id="riddle-num">01</span>.txt</div>
    <div class="riddle-prompt" id="riddle-prompt">Loading…</div>
    <div class="answer-row">
      <input
        type="text"
        id="answer-input"
        placeholder="your answer..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      >
      <button class="btn btn-solid" id="submit-btn">submit</button>
    </div>
    <div class="riddle-feedback" id="riddle-feedback"></div>
    <div class="attempt-dots" id="attempt-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</main>

<!-- Finale Screen 1 — You did it! -->
<div class="finale-overlay" id="finale-1">
  <div class="finale-photo-wrap scanlines">
    <img src="../pictures/Level4/finale-1.jpg" alt="" class="finale-photo">
  </div>
  <div class="finale-heading">You did it.</div>
  <div class="finale-sub">Smartypants.</div>
  <button class="btn btn-solid" id="finale-1-btn">→ one more thing</button>
</div>

<!-- Finale Screen 2 — Thank you my love -->
<div class="finale-overlay" id="finale-2">
  <div class="finale-photo-wrap scanlines">
    <img src="../pictures/Level4/finale-2.jpg" alt="" class="finale-photo">
  </div>
  <div class="finale-heading" style="font-size: clamp(1.5rem, 4vw, 2.4rem); max-width: 22ch; text-align:center;">
    Thank you for everything,<br><em>my love.</em>
  </div>
  <div class="finale-sub">// L · xo</div>
  <button class="btn btn-solid" id="finale-2-btn">→ back to the beginning</button>
</div>

<script src="../shared/utils.js"></script>
<script src="config.js"></script>
<script>
(function () {
  const fragmentsEl = document.getElementById('fragments');
  const solvedEl    = document.getElementById('solved');
  const cardEl      = document.getElementById('riddle-card');
  const numEl       = document.getElementById('riddle-num');
  const promptEl    = document.getElementById('riddle-prompt');
  const inputEl     = document.getElementById('answer-input');
  const submitEl    = document.getElementById('submit-btn');
  const feedbackEl  = document.getElementById('riddle-feedback');
  const dotsEl      = document.getElementById('attempt-dots');
  const progressFill= document.getElementById('progress-fill');

  const { riddles } = LEVEL4_CONFIG;

  // Build fragments
  riddles.forEach((r, i) => {
    const frag = document.createElement('div');
    frag.className = 'fragment';
    frag.innerHTML = `
      <span class="frag-num">// ${String(i + 1).padStart(2, '0')}</span>
      <img src="${picturePath(4, r.fragmentImage)}" alt="">
    `;
    fragmentsEl.appendChild(frag);
  });

  let idx = 0;
  let wrongAttempts = 0;

  loadRiddle();

  function loadRiddle() {
    if (idx >= riddles.length) { endGame(); return; }

    const r = riddles[idx];
    const num = String(idx + 1).padStart(2, '0');

    cardEl.dataset.index = `${num} / 05`;
    numEl.textContent = num;

    // Typewrite the prompt
    promptEl.textContent = '';
    typewrite(promptEl, r.prompt, 18);

    inputEl.value = '';
    inputEl.disabled = false;
    submitEl.disabled = false;
    feedbackEl.textContent = '';
    feedbackEl.className = 'riddle-feedback';
    wrongAttempts = 0;
    updateDots();
    setTimeout(() => inputEl.focus(), 100);
  }

  function checkAnswer() {
    const raw = inputEl.value.trim().toLowerCase();
    if (!raw) return;

    const r = riddles[idx];
    const isCorrect = r.answers.map(a => a.toLowerCase()).some(a => a === raw);

    if (isCorrect) {
      inputEl.classList.add('correct-flash');
      feedbackEl.textContent = '// correct';
      feedbackEl.className = 'riddle-feedback ok';
      inputEl.disabled = true;
      submitEl.disabled = true;
      cardEl.classList.add('solved');

      // Reveal fragment
      const frag = fragmentsEl.children[idx];
      frag.classList.add('revealed');

      idx++;
      solvedEl.textContent = idx;
      progressFill.style.width = (idx / riddles.length * 100) + '%';

      setTimeout(() => {
        cardEl.classList.remove('solved');
        inputEl.classList.remove('correct-flash');
        loadRiddle();
      }, 1400);

    } else {
      inputEl.classList.add('wrong-flash');
      setTimeout(() => inputEl.classList.remove('wrong-flash'), 400);
      wrongAttempts = Math.min(wrongAttempts + 1, 5);
      feedbackEl.textContent = '// incorrect';
      feedbackEl.className = 'riddle-feedback err';
      updateDots();
      inputEl.select();
    }
  }

  function updateDots() {
    [...dotsEl.children].forEach((dot, i) => {
      dot.classList.toggle('active', i < wrongAttempts);
    });
  }

  submitEl.addEventListener('click', checkAnswer);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });

  function endGame() {
    promptEl.textContent = 'All proofs complete.';
    inputEl.style.display = 'none';
    submitEl.style.display = 'none';
    feedbackEl.textContent = '// Q.E.D.';
    feedbackEl.className = 'riddle-feedback ok';

    Progress.set(4);

    // Screen 1 — "You did it! Smartypants!"
    setTimeout(() => {
      document.getElementById('finale-1').classList.add('visible');
    }, 1200);
  }

  // Screen 1 → Screen 2
  document.getElementById('finale-1-btn').addEventListener('click', () => {
    document.getElementById('finale-1').classList.remove('visible');
    setTimeout(() => {
      document.getElementById('finale-2').classList.add('visible');
    }, 500);
  });

  // Screen 2 → back to index
  document.getElementById('finale-2-btn').addEventListener('click', () => {
    document.getElementById('finale-2').classList.remove('visible');
    setTimeout(() => {
      window.location.href = '../menu.html';
    }, 500);
  });

  // Music
  try { initMusic('../shared/music-level4.mp3'); } catch(e) {}

  // Cheat: Shift+S skips straight to finale screens
  document.addEventListener('keydown', function(e) {
    if (e.shiftKey && e.key === 'S') {
      Progress.set(4);
      promptEl.textContent = 'All proofs complete.';
      inputEl.style.display = 'none';
      submitEl.style.display = 'none';
      feedbackEl.textContent = '// Q.E.D.';
      feedbackEl.className = 'riddle-feedback ok';
      // Reveal all fragments
      [...document.getElementById('fragments').children].forEach(f => f.classList.add('revealed'));
      document.getElementById('progress-fill').style.width = '100%';
      setTimeout(() => {
        document.getElementById('finale-1').classList.add('visible');
      }, 800);
    }
  });
})();
</script>
</body>
</html>
