<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03 — Navigation</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
/* Level 3 — Maze Quiz */

.maze {
  display: grid;
  gap: 3px;
  max-width: 660px;
  margin: 0 auto 2rem;
  background: rgba(212, 135, 42, 0.1);
  padding: 3px;
  border: var(--border);
  aspect-ratio: 7/5;
}

.tile {
  background: var(--slate-2);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  transition: all 0.4s ease;
}
.tile.path {
  background:
    repeating-linear-gradient(
      45deg,
      var(--slate-2) 0px,
      var(--slate-2) 5px,
      rgba(212,135,42,0.06) 5px,
      rgba(212,135,42,0.06) 10px
    );
}
.tile.walked {
  background: rgba(212, 135, 42, 0.12);
  border: 1px solid rgba(212, 135, 42, 0.3);
  animation: tileOn 0.5s ease;
}
.tile.walked::after {
  content: "·";
  color: var(--amber);
  font-size: 1.2rem;
}
.tile.current {
  background: rgba(212, 135, 42, 0.2);
  border: 1px solid var(--amber);
  animation: currentPulse 1.6s ease-in-out infinite;
}
.tile.current::after {
  content: "▸";
  color: var(--amber);
  font-size: 0.9rem;
}
.tile.start::after { content: "S"; color: var(--amber-dim); font-size: 0.6rem; }
.tile.goal::after  { content: "G"; color: var(--amber); font-size: 0.6rem; }
.tile.start.walked::after { content: "S"; }

@keyframes tileOn {
  from { transform: scale(0.8); opacity: 0.3; }
  to   { transform: scale(1); opacity: 1; }
}
@keyframes currentPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(212,135,42,0.4); }
  50%     { box-shadow: 0 0 0 6px rgba(212,135,42,0); }
}

/* Question card */
.q-card {
  max-width: 660px;
  margin: 0 auto;
  background: var(--slate-2);
  border: var(--border);
  border-left: 3px solid var(--amber);
  padding: 1.75rem;
}
.q-node {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--amber-dim);
  letter-spacing: 0.1em;
  margin-bottom: 0.75rem;
}
.q-text {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 1.15rem;
  color: var(--chalk);
  margin-bottom: 1.25rem;
  line-height: 1.4;
}
.q-options { display: grid; gap: 4px; }
.q-option {
  text-align: left;
  padding: 0.6rem 0.9rem;
  background: var(--slate);
  border: 1px solid rgba(232, 228, 220, 0.08);
  color: var(--chalk-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 2px;
  letter-spacing: 0.02em;
}
.q-option:hover:not(:disabled) {
  border-color: var(--amber);
  color: var(--chalk);
  background: rgba(212, 135, 42, 0.05);
}
.q-option.correct {
  background: rgba(212, 135, 42, 0.15);
  border-color: var(--amber);
  color: var(--amber);
}
.q-option.wrong {
  background: rgba(192, 57, 43, 0.1);
  border-color: rgba(192, 57, 43, 0.4);
  color: #c0392b;
}
.q-option:disabled { cursor: default; }

.q-feedback {
  margin-top: 0.75rem;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--chalk-dim);
  min-height: 1.2em;
  letter-spacing: 0.05em;
}
.q-feedback.ok { color: var(--amber); }
.q-feedback.err { color: #c0392b; }

.source-badge {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 0.2rem 0.5rem;
  border: 1px solid rgba(212, 135, 42, 0.3);
  color: var(--amber-dim);
  border-radius: 2px;
  margin-left: auto;
}
</style>
</head>
<body>
<main class="page">
  <a href="../index.html" class="back-link">index</a>
  <header class="page-header">
    <div>
      <div class="label">Problem 03 — Navigation</div>
      <h1>Path quiz</h1>
    </div>
    <div class="meta">
      nodes: <strong id="steps">0</strong> / <span id="total">0</span><br>
      wrong: <strong id="wrongs">0</strong>
    </div>
  </header>

  <div class="maze" id="maze"></div>

  <div class="q-card" id="qcard">
    <div class="q-node" id="qnode"></div>
    <div class="q-text" id="qtext">Initialising…</div>
    <div class="q-options" id="qoptions"></div>
    <div class="q-feedback" id="qfeedback"></div>
  </div>
</main>

<div class="reveal-overlay" id="reveal"></div>
<script src="../shared/utils.js"></script>
<script src="config.js"></script>
<script>
(function () {
  const mazeEl  = document.getElementById('maze');
  const stepsEl = document.getElementById('steps');
  const totalEl = document.getElementById('total');
  const wrongsEl= document.getElementById('wrongs');
  const qnodeEl = document.getElementById('qnode');
  const qtextEl = document.getElementById('qtext');
  const qoptsEl = document.getElementById('qoptions');
  const qfbEl   = document.getElementById('qfeedback');

  const { cols, rows, path, questions } = LEVEL3_CONFIG;
  mazeEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  mazeEl.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
  mazeEl.style.aspectRatio = `${cols} / ${rows}`;

  const tiles = [];
  for (let r = 0; r < rows; r++) {
    tiles[r] = [];
    for (let c = 0; c < cols; c++) {
      const t = document.createElement('div');
      t.className = 'tile';
      mazeEl.appendChild(t);
      tiles[r][c] = t;
    }
  }

  path.forEach(([c, r]) => tiles[r][c].classList.add('path'));
  const [sc, sr] = path[0];
  const [gc, gr] = path[path.length - 1];
  tiles[sr][sc].classList.add('start', 'walked');
  tiles[gr][gc].classList.add('goal');

  const stepsToWalk = path.length - 1;
  totalEl.textContent = stepsToWalk;

  const pool = shuffle([...questions]);
  let stepIdx = 0, wrongs = 0;

  highlightCurrent();
  askNext();

  function highlightCurrent() {
    document.querySelectorAll('.tile.current').forEach(t => t.classList.remove('current'));
    if (stepIdx + 1 >= path.length) return;
    const [nc, nr] = path[stepIdx + 1];
    tiles[nr][nc].classList.add('current');
  }

  function askNext() {
    if (stepIdx >= stepsToWalk) { endGame(); return; }
    const q = pool[stepIdx % pool.length];
    qnodeEl.textContent = `// node_${String(stepIdx + 1).padStart(2, '0')}`;
    qtextEl.textContent = q.q;
    qoptsEl.innerHTML = '';
    qfbEl.textContent = '';
    qfbEl.className = 'q-feedback';

    const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
    shuffle(opts).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'q-option';
      btn.textContent = opt.text;
      btn.addEventListener('click', () => handle(btn, opt.isCorrect));
      qoptsEl.appendChild(btn);
    });
  }

  function handle(btn, isCorrect) {
    [...qoptsEl.children].forEach(b => b.disabled = true);
    if (isCorrect) {
      btn.classList.add('correct');
      qfbEl.textContent = '// correct → advancing';
      qfbEl.classList.add('ok');
      stepIdx++;
      const [nc, nr] = path[stepIdx];
      tiles[nr][nc].classList.remove('current');
      tiles[nr][nc].classList.add('walked');
      stepsEl.textContent = stepIdx;
      setTimeout(() => { highlightCurrent(); askNext(); }, 900);
    } else {
      btn.classList.add('wrong');
      wrongs++;
      wrongsEl.textContent = wrongs;
      qfbEl.textContent = '// incorrect — retry';
      qfbEl.classList.add('err');
      setTimeout(askNext, 1100);
    }
  }

  function endGame() {
    qtextEl.textContent = 'All nodes traversed.';
    qoptsEl.innerHTML = '';
    qfbEl.textContent = '';
    setTimeout(() => {
      Progress.set(3);
      showReveal({
        imageSrc: picturePath(3, LEVEL3_CONFIG.finalImage),
        message: LEVEL3_CONFIG.finalMessage,
        sub: LEVEL3_CONFIG.finalSub,
        buttonText: '→ problem 04',
        onContinue: () => window.location.href = '../level4/index.html',
      });
    }, 700);
  }
})();

// Music
try { initMusic('../shared/music-level3.mp3'); } catch(e) {}

// Cheat: Shift+S skips to level end
document.addEventListener('keydown', function(e) {
  if (e.shiftKey && e.key === 'S') {
    Progress.set(3);
    showReveal({
      imageSrc: picturePath(3, LEVEL3_CONFIG.finalImage),
      message: LEVEL3_CONFIG.finalMessage,
      sub: LEVEL3_CONFIG.finalSub,
      buttonText: '→ problem 04',
      onContinue: () => window.location.href = '../level4/index.html',
    });
  }
});
</script>
</body>
</html>
